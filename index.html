<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <meta name="theme-color" content="#0B0B0C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GOMAU" />
    <link rel="apple-touch-icon" href="/logotrad.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>G∴O∴M∴A∴U∴ - Grande Oriente Maçônico Universal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Registro imediato do Service Worker (sem aguardar o evento 'load') para ativação instantânea no Chrome
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => {
            console.log('SW Ativado com Sucesso:', reg.scope);
          })
          .catch(err => console.log('SW reg error:', err));
      }

      // Captura o evento de instalação logo no início para ser usado a qualquer momento
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPWAInstallPrompt = e;
        // Dispara um evento personalizado indicando que o prompt está pronto
        window.dispatchEvent(new CustomEvent('pwa-prompt-ready', { detail: e }));
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
